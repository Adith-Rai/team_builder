# Phase 3 BC-init AWR run: 3 MMs + Minikazam + 2 MCTS.
# Used by Run #4 (BC + everything + AWR) and Run #3 (BC + everything NO AWR ablation).
#
# vs fishbowl_lr1e-4_v1: ADDS mm-minikazam (the strongest MM, model loses ~91% vs it
# in phase2_ext_v2_dense data). At weight=1.0 it'll be PFSP-prioritized due to low WR,
# providing the strongest external pressure for elite-play refinement loop.
#
# All MM temperatures set to 0.01 (effectively zero — see [[external-opp-temperature]]
# memory note for why not literal 0).
opponents:
- name: mcts-fast
  type: mcts
  search_time_ms: 100
  weight: 1.0
- name: mcts-medium
  type: mcts
  search_time_ms: 300
  weight: 1.0
- name: mm-largerl
  type: metamon
  model: LargeRL
  temperature: 0.01
  server_port: 9000
  weight: 1.0
  instances: 3
- name: mm-mediumrl-aug
  type: metamon
  model: MediumRL_Aug
  temperature: 0.01
  server_port: 9000
  weight: 1.0
  instances: 3
- name: mm-syntheticrlv2
  type: metamon
  model: SyntheticRLV2
  temperature: 0.01
  server_port: 9000
  weight: 1.0
  instances: 3
- name: mm-minikazam
  type: metamon
  model: Minikazam
  temperature: 0.01
  server_port: 9000
  weight: 1.0
  instances: 3
