# Curated pool for the post-S43 training run from sp_0229.
#
# Rationale (from S43 retrospective documented in docs/NEXT_SESSION.md):
# - The S43 production run got 30+ self-play snapshots auto-discovered, drowning
#   out the configured FP/MM weights. Smart_avg dropped 5pt while we gained
#   only marginally on FP and lost vs mcts.
# - Per the team_selection 70-team scan, sp_0229 already beats sp_2979 on
#   most metrics (TEAM_AX 81.5% vs TEAM_AU 78.5%); we want to PUSH it past
#   sp_0229's level on the FP/MM externals specifically without losing the
#   bot-eval performance.
# - Pool-curation hazard: must move pre-peak old runs aside on disk
#   BEFORE launch (see pre-flight commands in NEXT_SESSION.md curated-pool
#   section). Keeping peak-era references (sp_2979, sp_2999, sp_3009,
#   sp_3029) is GOOD; mid-training pre-peak (sp_0284, sp_0439, sp_1199)
#   inflates self-play sample share without giving real gradient signal.
#
# Weight design (group totals after PFSP boost will normalize):
#   mcts group   1.5  (mcts-fast 1.0 + mcts-medium 0.5 = search-time diversity)
#   FP group     1.6  (4 entries × 0.4 each, up from prior 0.25)
#   MM group     2.0  (4 entries × 0.5 each, up from prior 0.25)
#   self-play   ~0.4-0.6  (~5-8 curated peak-era + new run snapshots × ~0.06 each)
#
# Net: external opponents collectively ~5.1 vs self-play ~0.5. PFSP weights
# the harder ones up further. Should yield ~1.5-2 MM samples per iter on
# average (was ~0.8 in the diluted pool).

opponents:
  # ─── In-process MCTS (search-strength diversity) ──────────────
  - name: mcts-fast
    type: mcts
    search_time_ms: 80
    weight: 1.0
  - name: mcts-medium
    type: mcts
    search_time_ms: 200
    weight: 0.5

  # ─── 4× Foul Play (CPU MCTS + Smogon-set guessing) ────────────
  # 4 instances for throughput parallelism (FP has no neural model;
  # multi-process is the natural way to scale). All identical config.
  - name: foulplay-100ms-1
    type: foulplay
    showdown_username: FoulPlayBot1
    search_time_ms: 100
    server_port: 9000
    weight: 0.4
  - name: foulplay-100ms-2
    type: foulplay
    showdown_username: FoulPlayBot2
    search_time_ms: 100
    server_port: 9000
    weight: 0.4
  - name: foulplay-100ms-3
    type: foulplay
    showdown_username: FoulPlayBot3
    search_time_ms: 100
    server_port: 9000
    weight: 0.4
  - name: foulplay-100ms-4
    type: foulplay
    showdown_username: FoulPlayBot4
    search_time_ms: 100
    server_port: 9000
    weight: 0.4

  # ─── 4× Metamon variants (boosted from 0.25 → 0.5 each) ───────
  # Diversity: small RL, medium RL, BC-only, gen9-tuned RL.
  # VRAM budget (S42 measurements): 173+218+215+530 = ~1.14 GB total.
  - name: mm-minikazam
    type: metamon
    model: Minikazam
    temperature: 1.0
    server_port: 9000
    weight: 0.5
  - name: mm-smallrl
    type: metamon
    model: SmallRL
    temperature: 1.0
    server_port: 9000
    weight: 0.5
  - name: mm-smallil
    type: metamon
    model: SmallIL
    temperature: 1.0
    server_port: 9000
    weight: 0.5
  - name: mm-mediumrl
    type: metamon
    model: MediumRL
    temperature: 1.0
    server_port: 9000
    weight: 0.5
