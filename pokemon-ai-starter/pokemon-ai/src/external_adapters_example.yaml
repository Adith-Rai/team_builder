# external_adapters_example.yaml — external opponents for the PFSP pool.
#
# Loaded by train_rl.py via --external-adapters <this-file>. Each entry adds
# one Player to the snapshot_pool, sampled and weighted just like our own
# checkpoints.
#
# Adapter types:
# - mcts: poke-engine MCTS in-process. Lightweight, same venv. Fast.
#   `pokeengine` accepted as alias.
# - metamon: subprocess in metamon_venv running a pretrained Metamon agent.
#   Plays our procedural Smogon teams (use_our_teams: true, default).
# - foulplay: subprocess in foul_play_venv running real Foul Play (Smogon
#   set guessing + multi-MCTS averaging via poke-engine).

opponents:
  # Fast in-process MCTS — non-NN baseline that's different from our snapshots.
  - name: mcts-fast
    type: mcts
    search_time_ms: 100
    weight: 1.0

  # Real Foul Play — subprocess. Searches longer per move; uses our
  # procedural teams via the team queue.
  - name: foulplay-200ms
    type: foulplay
    search_time_ms: 200
    server_port: 9000
    weight: 1.0

  # Metamon Minikazam — smallest variant (4.7M params). Plays our
  # procedural teams (use_our_teams: true default).
  - name: metamon-minikazam
    type: metamon
    model: Minikazam
    temperature: 1.0
    server_port: 9000
    weight: 1.0
