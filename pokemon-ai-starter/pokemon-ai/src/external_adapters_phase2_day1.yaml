# Phase 2 day-1 external pool (S67 decision, 2026-05-21).
#
# 6 day-1 externals (the "easy + medium" curriculum entry point):
#   - 2 mcts (search-style diversity, GPU-free, fast)
#   - 4 metamon (Minikazam, SmallIL, SmallRL, MediumIL — easy/medium tier)
#
# Excluded from day-1 (manual addition later based on WR triggers):
#   - MediumRL, MediumRL_Aug, LargeRL — STRONG tier, add when WR vs day-1 ≥ 55%
#   - Kakuna, Superkazam — TOP tier, add later still
#   - FoulPlay (FP) — DEFERRED until ≥30% WR vs FP (was 88% loss at sp_0229)
#
# Note on MediumIL: previously flagged in curated.yaml as "suspicious" for
# toId() / showdown_username matching issues. VALIDATE in a smoke before
# launching real Phase 2. If issues, swap out for SmallIL+SmallRL doubled.
#
# Note on "Superkazam": referenced in curated.yaml Phase 3 comment as a real
# Metamon variant (alongside Kakuna). NOT FEASIBLE on local 3060 (6 GB VRAM);
# cloud only. Add to pool later when training on cloud pod.
#
# Stage 2 composition (active opps per iter, user S67 design):
#   1 random_sp + 4 PFSP_sp + 1 prev_sp + 1 prevprev_sp + 2 PFSP_ext + 1 random_ext
#                            ^^ forced ^^
#   = 10 active (4 sp + 4 sp anchors/PFSP + 2 ext PFSP)
#   ... actually pool=4 ext means PFSP-2-from-6 plus 1 random rotates among 6 — 3 ext slots active per iter
#
# Weight rationale (PFSP normalizes per (1-wr)² × yaml_weight):
#   mcts group  1.5 (in-process, low cost, search diversity)
#   MM group    1.6 (4 × 0.4 each — equal weighting at day 1)
#   self-play   ~0.3-0.5 (growing pool, ~0.05/snap with anchors forcing 2)
#
# Phase progression (manual triggers based on Elo poller data):
#   Day 1 → add MediumRL family when WR vs day-1 pool ≥ 55%
#   Tier 2 → add LargeRL when WR vs tier-1+2 ≥ 55%
#   Tier 3 → add Kakuna + Superkazam when stable on tier-1+2 and on cloud
#   FoulPlay → add 1 entry at weight 0.2 when WR vs FP ≥ 30% in eval

opponents:
  # ─── In-process MCTS (search-strength diversity, GPU-free, fast) ──
  - name: mcts-fast
    type: mcts
    search_time_ms: 80
    weight: 1.0
  - name: mcts-medium
    type: mcts
    search_time_ms: 200
    weight: 0.5

  # ─── 4× Metamon (easy/medium tier — day-1 entry point) ──
  - name: mm-minikazam
    type: metamon
    model: Minikazam
    temperature: 1.0
    server_port: 9000
    weight: 0.4
  - name: mm-smallil
    type: metamon
    model: SmallIL
    temperature: 1.0
    server_port: 9000
    weight: 0.4
  - name: mm-smallrl
    type: metamon
    model: SmallRL
    temperature: 1.0
    server_port: 9000
    weight: 0.4
  - name: mm-mediumil
    type: metamon
    model: MediumIL
    temperature: 1.0
    server_port: 9000
    weight: 0.4
    # NOTE: validate this one in smoke before full Phase 2 — previously
    # flagged as "suspicious" in curated.yaml for toId() issues.
