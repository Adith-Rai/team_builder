# Phase 3 / Run #9 external adapter pool: 2 MCTS + 4 MMs + ALL non-eval heuristic bots.
#
# Extends external_adapters_phase3_full_v1.yaml (Run #7 setup) by adding
# all available heuristic bots EXCEPT the 4 used for eval (SH, SmartDmg,
# Tactical, Strategic — eval data leakage). The heuristic bots get their
# OWN PFSP sub-pool via --n-heur-per-iter (S68 2026-06-10).
#
# Heuristic-pool rationale (S68 2026-06-10):
# Including the weak originals (~720-830 Elo) alongside strong v2s
# (~950-1043 Elo) lets PFSP naturally downsample the weak bots (model
# wins ~95% vs RandomPlayer → very low (1-WR)² weight → rarely picked).
# The "1 random heur" slot ensures even weak bots SOMETIMES appear for
# variety. PFSP within heur pool prevents single-pool starving where
# MMs' very low WR would dominate selection (see project_s68_bot_elo_findings
# memo for the differential-WR rationale).

opponents:

# --- MCTS opponents (search-based, 2) ---
- name: mcts-fast
  type: mcts
  search_time_ms: 100
  weight: 1.0
- name: mcts-medium
  type: mcts
  search_time_ms: 300
  weight: 1.0

# --- Metamon RL opponents (4 MMs, 3 instances each = 12 subprocesses) ---
- name: mm-largerl
  type: metamon
  model: LargeRL
  temperature: 0.01
  server_port: 9000
  weight: 1.0
  instances: 3
- name: mm-mediumrl-aug
  type: metamon
  model: MediumRL_Aug
  temperature: 0.01
  server_port: 9000
  weight: 1.0
  instances: 3
- name: mm-syntheticrlv2
  type: metamon
  model: SyntheticRLV2
  temperature: 0.01
  server_port: 9000
  weight: 1.0
  instances: 3
- name: mm-minikazam
  type: metamon
  model: Minikazam
  temperature: 0.01
  server_port: 9000
  weight: 1.0
  instances: 3

# --- Heuristic bots — strong v2 set (5, ~950-1043 Elo, eval-bot tier) ---
# Built S68 2026-06-10 with SimpleHeuristicsPlayer base + specialty override.
# All inherit SH's strong defaults, each adds one distinct decision specialty.
- name: heur-greedysev2
  type: heuristic
  bot_class: GreedySEv2
  weight: 1.0
- name: heur-setupthenv2
  type: heuristic
  bot_class: SetupThenSweepv2
  weight: 1.0
- name: heur-switchawarev3
  type: heuristic
  bot_class: SwitchAwareEscapev3
  weight: 1.0
- name: heur-antisetup
  type: heuristic
  bot_class: AntiSetupBot
  weight: 1.0
- name: heur-hazardsensev2
  type: heuristic
  bot_class: HazardSensev2
  weight: 1.0

# --- Heuristic bots — weaker training-only set (2, ~720-880 Elo) ---
# Kept for stylistic variance. PFSP will downsample if too easy.
- name: heur-strategicv2
  type: heuristic
  bot_class: StrategicV2
  weight: 1.0
- name: heur-switchawareV2
  type: heuristic
  bot_class: SwitchAwareEscapeV2
  weight: 1.0

# --- Heuristic bots — raw originals (4, ~730-830 Elo) ---
# Original rule-bots from policy_rulebots.py. Hand-coded styles different
# from v2 SH-base. Variety even at lower strength.
- name: heur-greedyse-orig
  type: heuristic
  bot_class: GreedySEPlayer
  weight: 1.0
- name: heur-hazardsense-orig
  type: heuristic
  bot_class: HazardSensePlayer
  weight: 1.0
- name: heur-switchaware-orig
  type: heuristic
  bot_class: SwitchAwareEscapePlayer
  weight: 1.0
- name: heur-setupthensweep-orig
  type: heuristic
  bot_class: SetupThenSweepPlayer
  weight: 1.0

# --- Heuristic bots — poke-env baselines (2, very low Elo) ---
# RandomPlayer is essentially noise (~400 Elo). MaxBP is a pure damage
# maximizer (~720 Elo). Included per user direction ("even the shitty
# ones") — PFSP downsamples; "1 random heur" slot lets them appear
# occasionally for variety / RNG noise.
- name: heur-random
  type: heuristic
  bot_class: RandomPlayer
  weight: 1.0
- name: heur-maxbp
  type: heuristic
  bot_class: MaxBasePowerPlayer
  weight: 1.0

# Total: 2 MCTS + 4 MMs + 13 heuristics = 19 distinct opponents.
# When used with --n-ext-per-iter 5 --n-heur-per-iter 4:
#   - 5 ext slots filled from {mcts-fast, mcts-medium, 4 MMs} (6 candidates)
#   - 4 heur slots filled from 13 heuristic candidates
