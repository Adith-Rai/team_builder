# Phase 3 / Run #9 external adapter pool: 4 MMs + 2 MCTS + ALL non-eval heuristic bots.
#
# Heuristic-pool rationale (S68 2026-06-10):
# Including weak originals (~720-830 Elo) alongside strong v2s (~950-1043 Elo)
# lets PFSP naturally downsample weak bots (model wins ~95% vs RandomPlayer
# → very low (1-WR)² weight → rarely picked). The "1 random heur" slot
# ensures even weak bots SOMETIMES appear for variety. PFSP within the heur
# pool prevents single-pool starving where MMs' very low WR would dominate
# selection (see project_s68_bot_elo_findings memo for the differential-WR
# rationale). Heur pool requires --n-heur-per-iter flag (S68 2026-06-10).
#
# MCTS re-enabled 2026-06-11 after pokeengine_player.py mitigation:
# dropped exc_info=True on panic-catch warnings → no more per-panic
# Rust→Python traceback formatting. Run #7 prod absorbed 5,963 panics
# with no throughput impact even before the mitigation; this should let
# Run #9's load profile tolerate them too. Per-turn smart-fallback
# (TacticalPlayer) handles the panicking turn; subsequent turns retry
# MCTS as normal. Root cause documented in docs/TODO_MCTS_RUN9.md
# (mcts.rs:112 WeightedIndex::new panics when all outcome percentages
# are 0/NaN — a Rust-side bug requiring crate rebuild to fix fully).

opponents:

# --- MCTS opponents (2 search-budget tiers) ---
- name: mcts-fast
  type: mcts
  search_time_ms: 100
  weight: 1.0
- name: mcts-medium
  type: mcts
  search_time_ms: 300
  weight: 1.0

# --- Metamon RL opponents (4 MMs, 3 instances each = 12 subprocesses) ---
- name: mm-largerl
  type: metamon
  model: LargeRL
  temperature: 0.01
  server_port: 9000
  weight: 1.0
  instances: 3
- name: mm-mediumrl-aug
  type: metamon
  model: MediumRL_Aug
  temperature: 0.01
  server_port: 9000
  weight: 1.0
  instances: 3
- name: mm-syntheticrlv2
  type: metamon
  model: SyntheticRLV2
  temperature: 0.01
  server_port: 9000
  weight: 1.0
  instances: 3
- name: mm-minikazam
  type: metamon
  model: Minikazam
  temperature: 0.01
  server_port: 9000
  weight: 1.0
  instances: 3

# --- Heuristic bots — strong v2 set (5, ~950-1043 Elo, eval-bot tier) ---
# Built S68 2026-06-10 with SimpleHeuristicsPlayer base + specialty override.
- name: heur-greedysev2
  type: heuristic
  bot_class: GreedySEv2
  weight: 1.0
- name: heur-setupthenv2
  type: heuristic
  bot_class: SetupThenSweepv2
  weight: 1.0
- name: heur-switchawarev3
  type: heuristic
  bot_class: SwitchAwareEscapev3
  weight: 1.0
- name: heur-antisetup
  type: heuristic
  bot_class: AntiSetupBot
  weight: 1.0
- name: heur-hazardsensev2
  type: heuristic
  bot_class: HazardSensev2
  weight: 1.0

# --- Heuristic bots — weaker training-only set (2, ~720-880 Elo) ---
# Kept for stylistic variance. PFSP will downsample if too easy.
- name: heur-strategicv2
  type: heuristic
  bot_class: StrategicV2
  weight: 1.0
- name: heur-switchawareV2
  type: heuristic
  bot_class: SwitchAwareEscapeV2
  weight: 1.0

# --- Heuristic bots — raw originals (4, ~730-830 Elo) ---
# Original rule-bots from policy_rulebots.py. Hand-coded styles different
# from v2 SH-base. Variety even at lower strength.
# NOTE 2026-06-10: previously dropped SetupThenSweepPlayer and MaxBP based
# on false root-cause attribution (we thought they caused CIS hangs). Stress
# tests proved them fine — actual issue was MCTS serialization slowdown.
# Re-included for full diversity.
- name: heur-greedyse-orig
  type: heuristic
  bot_class: GreedySEPlayer
  weight: 1.0
- name: heur-hazardsense-orig
  type: heuristic
  bot_class: HazardSensePlayer
  weight: 1.0
- name: heur-switchaware-orig
  type: heuristic
  bot_class: SwitchAwareEscapePlayer
  weight: 1.0
- name: heur-setupthensweep-orig
  type: heuristic
  bot_class: SetupThenSweepPlayer
  weight: 1.0

# --- Heuristic bots — poke-env baselines (2, very low Elo) ---
# RandomPlayer (~400 Elo) is essentially noise. MaxBP (~720 Elo) is pure
# damage maximizer. Per user direction ("even the shitty ones") for variety
# / RNG. PFSP downsamples; "1 random heur" slot lets them appear occasionally.
- name: heur-random
  type: heuristic
  bot_class: RandomPlayer
  weight: 1.0
- name: heur-maxbp
  type: heuristic
  bot_class: MaxBasePowerPlayer
  weight: 1.0

# Total: 4 MMs + 13 heuristics = 17 distinct opponents.
# Designed for --n-ext-per-iter 4 --n-heur-per-iter 4:
#   - 4 ext slots filled from 4 MMs (full coverage)
#   - 4 heur slots filled from 13 heuristic candidates
