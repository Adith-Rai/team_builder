# Phase 3 / Run #9 external adapter pool: 4 MMs + ALL non-eval heuristic bots.
#
# Heuristic-pool rationale (S68 2026-06-10):
# Including weak originals (~720-830 Elo) alongside strong v2s (~950-1043 Elo)
# lets PFSP naturally downsample weak bots (model wins ~95% vs RandomPlayer
# → very low (1-WR)² weight → rarely picked). The "1 random heur" slot
# ensures even weak bots SOMETIMES appear for variety. PFSP within the heur
# pool prevents single-pool starving where MMs' very low WR would dominate
# selection (see project_s68_bot_elo_findings memo for the differential-WR
# rationale). Heur pool requires --n-heur-per-iter flag (S68 2026-06-10).
#
# ⚠️ MCTS DEFERRED 2026-06-10 — see TODO_MCTS_RUN9.md
# Stress test on dev pod (70 workers, 2240g, 15 opps) revealed MCTS-paired
# workers became severely slow due to compound effect: (1) MCTS executor is
# single-threaded per worker (ThreadPoolExecutor max_workers=1); (2) Run #9
# load profile has ~30 concurrent battles per worker per opp (vs Run #7's
# ~18), so MCTS queue depth is 70% deeper; (3) new "InvalidWeight" panic
# type appears in Run #9 (vs Run #7's "Encore" panic) — recovery overhead
# compounds across queue. Smart-fallback works (TacticalPlayer) but doesn't
# eliminate per-battle latency increase.
#
# Run #7 prod with MCTS works fine — 5,963 MCTS panics observed, no
# throughput impact. Run #9 dev with MCTS shows slow workers.
#
# Removed for THIS run as experimental decision (not a "fix").
# Three concrete investigation hooks before re-adding to Run #10+:
#  1. Patch _battle_to_pe_state to filter battle states triggering
#     InvalidWeight panic upstream (look at mcts.rs:111 source for
#     what makes weight invalid — possibly NaN/zero in move scoring).
#  2. Bump MCTS executor max_workers from 1 to 2-4 (less serialization,
#     more CPU usage per worker but better throughput).
#  3. Scale --mp-workers to match opps count (Run #7 has 9 workers/opp,
#     Run #9 had 5 workers/opp; equal/proximal scaling avoids queue depth
#     amplification).

opponents:

