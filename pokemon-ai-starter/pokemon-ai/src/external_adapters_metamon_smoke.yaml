# Smoke config: one Metamon Minikazam (subprocess, our procedural teams) +
# one fast MCTS (in-process). For the train_rl 1-iter end-to-end test.

opponents:
  - name: metamon-minikazam
    type: metamon
    model: Minikazam
    temperature: 1.0
    server_port: 9000
    weight: 1.0

  - name: mcts-fast
    type: mcts
    search_time_ms: 80
    weight: 1.0
