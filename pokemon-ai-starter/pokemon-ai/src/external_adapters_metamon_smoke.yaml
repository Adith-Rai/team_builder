# Minimal smoke config: one Metamon Minikazam (4.7M, smallest) + one PokeEngine.
# Used by the train_rl 1-iter end-to-end test for the metamon adapter.

opponents:
  - name: metamon-minikazam
    type: metamon
    model: Minikazam
    team_set: competitive
    temperature: 1.0
    server_port: 9000
    weight: 1.0

  - name: foulplay-fast
    type: pokeengine
    search_time_ms: 80
    weight: 1.0
